repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        language: system
        entry: cargo fmt --all -- --check
        pass_filenames: false
        types: [rust]

      - id: ruff
        name: ruff lint
        language: system
        entry: ruff check python
        pass_filenames: false
        types: [python]

      - id: go-fmt
        name: go fmt
        language: system
        entry: bash -c 'for d in services/tpt-observer services/synthesis-worker services/synthesis-broker services/crucible-cloud; do [ -d "$d" ] && (cd "$d" && go fmt ./...); done'
        pass_filenames: false
        types: [go]

      - id: frontend-lint
        name: frontend eslint
        language: system
        entry: bash -c 'cd frontend && npm run lint'
        pass_filenames: false
        types: [ts, tsx]
