version: "3.8"

services:
  observer:
    build:
      context: .
      dockerfile: services/tpt-observer/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - WORKER_URL=http://synthesis-worker:8081

  synthesis-worker:
    build:
      context: services/synthesis-worker
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    volumes:
      - work-data:/app/work

volumes:
  work-data:
