version: "3.8"

services:
  observer:
    build:
      context: .
      dockerfile: services/tpt-observer/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - WORKER_URL=http://synthesis-worker:8081

  synthesis-worker:
    build:
      context: services/synthesis-worker
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    volumes:
      - work-data:/app/work

  synthesis-broker:
    build:
      context: services/synthesis-broker
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    volumes:
      - cache-data:/app

  cloud-api:
    build:
      context: services/crucible-cloud
      dockerfile: Dockerfile
    ports:
      - "8082:8082"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  work-data:
  cache-data:
