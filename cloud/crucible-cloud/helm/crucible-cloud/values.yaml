replicaCount: 1

image:
  repository: tpt-crucible/crucible-cloud
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: crucible.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

redis:
  enabled: true
  host: ""
  port: 6379

synthesis:
  workerCount: 2
  image:
    repository: tpt-crucible/synthesis-worker
    tag: "latest"

catalyst:
  image:
    repository: tpt-crucible/catalyst
    tag: "latest"

resources:
  limits:
    cpu: 2000m
    memory: 4Gi
  requests:
    cpu: 500m
    memory: 1Gi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}
