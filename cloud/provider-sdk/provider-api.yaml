openapi: "3.0.3"
info:
  title: TPT Synthesis Provider API
  description: |
    Open API that any community synthesis provider must implement.
    A conforming provider can be registered with the TPT Synthesis Broker
    and will receive offloaded Yosys/Nextpnr compilation jobs.

    Run the official reference worker with:
      docker run -e BROKER_URL=https://your-broker ghcr.io/tpt-solutions/synthesis-worker:latest
  version: "1.0.0"
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: http://localhost:9090
    description: Local synthesis worker (default port)

paths:
  /capabilities:
    get:
      summary: Advertise provider capabilities
      description: |
        Returns the hardware targets this provider supports and the synthesis
        tool versions installed. The broker calls this on registration and
        periodically as a health check.
      operationId: getCapabilities
      responses:
        "200":
          description: Provider capabilities
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Capabilities"

  /jobs:
    post:
      summary: Submit a synthesis job
      description: |
        Accepts a .tptpkg file (ZIP) and synthesis parameters. Returns a job ID
        immediately; poll GET /jobs/{id} for status.
      operationId: submitJob
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [package, target]
              properties:
                package:
                  type: string
                  format: binary
                  description: The .tptpkg ZIP file to compile
                target:
                  type: string
                  enum: [fusion, alloy, element]
                  description: Hardware target
                driver:
                  type: string
                  description: Driver name from the registry (optional — uses embedded driver if absent)
                priority:
                  type: integer
                  minimum: 0
                  maximum: 10
                  default: 5
                  description: Job priority; higher runs first
      responses:
        "202":
          description: Job accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobAccepted"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Provider at capacity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /jobs/{id}:
    get:
      summary: Poll job status
      operationId: getJob
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobStatus"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /jobs/{id}/result:
    get:
      summary: Download compiled .tptpkg
      description: Only available when job status is "completed".
      operationId: getJobResult
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Compiled .tptpkg file
          content:
            application/zip:
              schema:
                type: string
                format: binary
        "404":
          description: Job not found or not yet complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  schemas:
    Capabilities:
      type: object
      required: [provider_id, targets, yosys_version, nextpnr_version]
      properties:
        provider_id:
          type: string
          description: Stable identifier for this provider instance
        targets:
          type: array
          items:
            type: string
            enum: [fusion, alloy, element]
          description: Hardware targets this provider can compile for
        yosys_version:
          type: string
          example: "0.40"
        nextpnr_version:
          type: string
          example: "0.7"
        max_concurrent_jobs:
          type: integer
          description: Maximum parallel jobs
        current_load:
          type: integer
          description: Number of jobs currently running

    JobAccepted:
      type: object
      required: [job_id, status]
      properties:
        job_id:
          type: string
        status:
          type: string
          enum: [queued]
        estimated_seconds:
          type: integer
          description: Rough ETA based on current load

    JobStatus:
      type: object
      required: [job_id, status]
      properties:
        job_id:
          type: string
        status:
          type: string
          enum: [queued, running, completed, failed]
        progress_pct:
          type: integer
          minimum: 0
          maximum: 100
        stage:
          type: string
          description: Current synthesis stage (e.g. "yosys:synth", "nextpnr:place", "nextpnr:route")
        error:
          type: string
          description: Present only when status is "failed"
        elapsed_seconds:
          type: number
        result_size_bytes:
          type: integer
          description: Size of compiled package; present when completed

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
        detail:
          type: string
